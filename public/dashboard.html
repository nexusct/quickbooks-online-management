<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - QuickBooks Online Management</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-center text-blue-600">QuickBooks Online Dashboard</h1>
            <p class="text-center text-gray-600 mt-2">Manage your QuickBooks Online data</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <!-- Connection Status Card -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-lg font-semibold mb-3 text-gray-800">Connection Status</h3>
                <div id="connection-status" class="flex items-center">
                    <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                    <span class="text-green-600 font-medium">Connected</span>
                </div>
                <button onclick="refreshToken()" class="mt-4 bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded text-sm w-full">
                    Refresh Token
                </button>
            </div>

            <!-- Quick Actions Card -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-lg font-semibold mb-3 text-gray-800">Quick Actions</h3>
                <div class="space-y-2">
                    <button onclick="loadCompanyInfo()" class="bg-purple-500 hover:bg-purple-600 text-white py-2 px-4 rounded text-sm w-full">
                        Company Info
                    </button>
                    <button onclick="loadCustomers()" class="bg-purple-500 hover:bg-purple-600 text-white py-2 px-4 rounded text-sm w-full">
                        View Customers
                    </button>
                    <button onclick="loadInvoices()" class="bg-purple-500 hover:bg-purple-600 text-white py-2 px-4 rounded text-sm w-full">
                        View Invoices
                    </button>
                </div>
            </div>

            <!-- System Health Card -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-lg font-semibold mb-3 text-gray-800">System Health</h3>
                <div id="health-status">
                    <p class="text-sm text-gray-600">Loading...</p>
                </div>
                <button onclick="checkHealth()" class="mt-4 bg-gray-500 hover:bg-gray-600 text-white py-2 px-4 rounded text-sm w-full">
                    Check Health
                </button>
            </div>
        </div>

        <!-- Data Display Area -->
        <div class="bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Data View</h2>
                <button onclick="clearData()" class="text-red-600 hover:text-red-800 text-sm">Clear</button>
            </div>
            <div id="data-display" class="bg-gray-50 p-4 rounded min-h-64 overflow-auto">
                <p class="text-gray-500 text-center">Select an action above to view data</p>
            </div>
        </div>

        <footer class="mt-8 text-center text-gray-600 text-sm">
            <p>Your data is retrieved directly from QuickBooks Online API</p>
            <p class="mt-1">
                <a href="/" class="text-blue-600 hover:text-blue-800">Return to Home</a>
            </p>
        </footer>
    </div>

    <script>
        // Display data helper
        function displayData(data) {
            const display = document.getElementById('data-display');
            const pre = document.createElement('pre');
            pre.className = 'text-sm text-gray-800 whitespace-pre-wrap';
            pre.textContent = JSON.stringify(data, null, 2);
            display.innerHTML = '';
            display.appendChild(pre);
        }

        // Display error helper
        function displayError(error) {
            const display = document.getElementById('data-display');
            display.innerHTML = `<div class="text-red-600"><strong>Error:</strong> ${error}</div>`;
        }

        // Clear data display
        function clearData() {
            const display = document.getElementById('data-display');
            display.innerHTML = '<p class="text-gray-500 text-center">Select an action above to view data</p>';
        }

        // Load company info
        async function loadCompanyInfo() {
            try {
                const response = await fetch('/api/company_info');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                displayData(data);
            } catch (error) {
                displayError(error.message);
            }
        }

        // Load customers
        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                displayData(data);
            } catch (error) {
                displayError(error.message);
            }
        }

        // Load invoices
        async function loadInvoices() {
            try {
                const response = await fetch('/api/invoices');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                displayData(data);
            } catch (error) {
                displayError(error.message);
            }
        }

        // Refresh token
        async function refreshToken() {
            try {
                const response = await fetch('/refresh_token');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                displayData(data);
                updateConnectionStatus(true);
            } catch (error) {
                displayError(error.message);
                updateConnectionStatus(false);
            }
        }

        // Check system health
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const healthStatus = document.getElementById('health-status');
                healthStatus.innerHTML = `
                    <p class="text-sm text-gray-600">Status: <span class="font-semibold text-green-600">${data.status}</span></p>
                    <p class="text-xs text-gray-500 mt-1">Uptime: ${Math.floor(data.uptime / 60)} minutes</p>
                `;
            } catch (error) {
                const healthStatus = document.getElementById('health-status');
                healthStatus.innerHTML = `<p class="text-sm text-red-600">Status: Error</p>`;
            }
        }

        // Update connection status display
        function updateConnectionStatus(connected) {
            const statusDiv = document.getElementById('connection-status');
            if (connected) {
                statusDiv.innerHTML = `
                    <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                    <span class="text-green-600 font-medium">Connected</span>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="w-3 h-3 rounded-full bg-red-500 mr-2"></div>
                    <span class="text-red-600 font-medium">Disconnected</span>
                `;
            }
        }

        // Check connection status on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/status');
                if (response.ok) {
                    const data = await response.json();
                    updateConnectionStatus(data.authenticated);
                }
            } catch (error) {
                updateConnectionStatus(false);
            }
            
            // Check health on load
            checkHealth();
        });
    </script>
</body>
</html>
